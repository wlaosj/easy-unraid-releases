name: Build & Publish Release (Unlimited Free)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --------------------------------------------------
  # 0. 提取 App 版本信息与私有仓日志
  # --------------------------------------------------
  get-version:
    name: Get App Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4
        with:
          repository: wlaosj/easy-unraid
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Extract Version
        id: version
        run: |
          python3 -c '
          import sys
          version = ""
          with open("pubspec.yaml", "r") as f:
              for line in f:
                  raw_line = line.strip()
                  if raw_line.startswith("version:"):
                      version = raw_line.split(":")[1].strip()
                      break
          
          build_name, build_number = version.split("+") if "+" in version else (version, "0")
          
          with open(sys.argv[1], "a") as out:
              out.write(f"version={version}\n")
              out.write(f"build_name={build_name}\n")
              out.write(f"build_number={build_number}\n")
          ' "$GITHUB_OUTPUT"

  # --------------------------------------------------
  # 1. 编译 Android APK
  # --------------------------------------------------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4
        with:
          repository: wlaosj/easy-unraid
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_STORE_PASSWORD" ]; then
            echo "Error: Missing Android signing secrets! Stopping build."
            exit 1
          fi
          echo "Decoding Android Keystore..."
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/key.jks 2>/dev/null || echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          echo "Creating key.properties..."
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=key" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties

      - name: Build Android arm64 APK
        run: flutter build apk --target-platform android-arm64 --build-name=${{ needs.get-version.outputs.build_name }} --build-number=${{ needs.get-version.outputs.build_number }}

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/app-release.apk

  # --------------------------------------------------
  # 2. 编译 macOS Release (DMG 磁盘映像)
  # --------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: get-version
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4
        with:
          repository: wlaosj/easy-unraid
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build macOS Release
        run: flutter build macos --release --build-name=${{ needs.get-version.outputs.build_name }} --build-number=${{ needs.get-version.outputs.build_number }}

      - name: Create DMG File
        run: |
          cd build/macos/Build/Products/Release/
          brew install create-dmg
          create-dmg \
            --volname "Easy Unraid" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "Easy Unraid.app" 120 120 \
            --hide-extension "Easy Unraid.app" \
            --app-drop-link 380 120 \
            "Easy-Unraid-macOS.dmg" \
            "Easy Unraid.app"

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/Build/Products/Release/Easy-Unraid-macOS.dmg

  # --------------------------------------------------
  # 3. 编译 Windows Release (ZIP 压缩包)
  # --------------------------------------------------
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: get-version
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4
        with:
          repository: wlaosj/easy-unraid
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release --build-name=${{ needs.get-version.outputs.build_name }} --build-number=${{ needs.get-version.outputs.build_number }}

      - name: Archive Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/Release/Easy-Unraid-Windows.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: build/windows/x64/runner/Release/Easy-Unraid-Windows.zip

  # --------------------------------------------------
  # 4. 创建 GitHub Release 并更新 version.json
  # --------------------------------------------------
  publish-release:
    name: Publish Release
    needs: [get-version, build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Code for Changelog
        uses: actions/checkout@v4
        with:
          repository: wlaosj/easy-unraid
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: artifacts/

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/

      - name: Rename Files for Release
        run: |
          mkdir -p artifacts
          cd artifacts/
          mv app-release.apk Easy-Unraid-Android.apk || true
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          prerelease: true
          files: |
            artifacts/*
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Public Releases Repo for version.json
        uses: actions/checkout@v4
        with:
          path: releases_repo

      - name: Update version.json
        run: |
          python3 -c '
          import re, json
          target = "${{ needs.get-version.outputs.version }}"
          try:
              with open("CHANGELOG.md", "r", encoding="utf-8") as f:
                  text = f.read()
              pattern = r"##\s*\[" + re.escape(target) + r"\].*?\n(.*?(?=\n##\s*\[|\Z))"
              match = re.search(pattern, text, re.DOTALL)
              changelog = match.group(1).strip() if match else "🚀 New version released!"
          except Exception as e:
              print("Error parsing CHANGELOG.md:", e)
              changelog = "🚀 New version released!"
          
          out = {
              "tag_name": "v" + target,
              "html_url": f"https://github.com/wlaosj/easy-unraid-releases/releases/tag/v{target}",
              "body": changelog
          }
          with open("releases_repo/version.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          '
          
          cd releases_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "ci: auto update version.json to v${{ needs.get-version.outputs.version }}" || true
          git push
